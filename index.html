<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="left-content"><!--style="background-image: url(assets/img/Placeholder/halie-west-25xggax4bSA-unsplash.jpg); background-size: cover;"-->
            <div class="logo">
                <img src="assets/img/Placeholder/odin-lined.png">
                <p>ODIN</p>
            </div>
            <p class="credit">Photo by <u>Halie West</u> on <u>Unsplash</u></p>
        </div>

        <div class="right-content">
            <div>
                <h2>This is not a real online service! 
                You know you need something like this in your life to help you realize your deepest dreams. 
                Sign up now to get started.</h2>
            <br>
            <h2>You know you want to.</h2>
            </div>

            <form>
                <h2>Lets do this</h2>

                <div class="form-row">
                <label for="first_name">FIRST NAME</label>
                <input type="text" id="first_name" name="first_name">

                <label for="last_name">LAST NAME</label>
                <input type="text" id="last_name" name="last_name">
                </div>

                <div class="form-row">
                <label for="email">EMAIL</label>
                <input type="email" id="email" name="email">

                <label for="phone_number">PHONE NUMBER</label>
                <input type="number" id="phone_number" name="phone_number">
                </div>

                <div class="form-row">
                <label for="password">PASSWORD</label>
                <input type="password" id="password" name="password">

                <label for="confirm_password">CONFIRM PASSWORD</label>
                <input type="password" id="confirm_password" name="confirm_password">
                </div>

                <button type="submit">Create Account</button>

                <p>Already have an account ? Log in</p>
            </form>


        </div>
    </div>
</body>
</html>
